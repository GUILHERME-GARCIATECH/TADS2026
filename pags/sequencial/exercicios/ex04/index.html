<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor R$ para U$</title>
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header>
        <h1>Conversor de reais para <span>dolares</span></h1>
        <p>Informe o valor da sua carteira(R$) para saber quantos dolares consegue comprar.</p>
    </header>
    
    <main>
        <div class="container-botao">
            <button onclick="calcular()">Clique aqui para converter sua carteira</button>
            <p>Cotação fixa: U$6 = R$1 </p>
            <div id="res">
                <p>O seu resultado aparecerá aqui...</p>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
